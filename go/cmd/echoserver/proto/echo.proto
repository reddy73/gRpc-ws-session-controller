syntax = "proto3";
package echo;
option go_package = "github.com/grpc-ws-session-k8s/cmd/echoserver/proto";

service EchoService {
  rpc Echo(EchoRequest) returns (EchoResponse);
  rpc StreamEcho(stream EchoRequest) returns (stream EchoResponse);
}

message EchoRequest  { string message = 1; }
message EchoResponse { string message = 1; string pod = 2; }
