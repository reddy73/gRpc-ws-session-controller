apiVersion: apps/v1
kind: Deployment
metadata:
  name: echoserver
  namespace: session-test
  labels:
    app: echoserver
spec:
  replicas: 2
  selector:
    matchLabels:
      app: echoserver
  # Rolling update simulates a rollout — tests endpoint rebinding
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: echoserver
    spec:
      # Give pods 30s to drain active gRPC streams before SIGKILL
      terminationGracePeriodSeconds: 30
      containers:
        - name: echoserver
          image: echoserver:test
          imagePullPolicy: Never          # loaded via kind load
          ports:
            - containerPort: 50051
              name: grpc
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: PORT
              value: "50051"
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: echoserver
  namespace: session-test
spec:
  selector:
    app: echoserver
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
  type: ClusterIP
